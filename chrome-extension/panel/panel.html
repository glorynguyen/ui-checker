<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Figma CSS Diff</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <button id="pick-btn" class="btn btn-primary">Pick Element</button>
    <span id="pick-status" class="pick-status"></span>
    <button id="settings-btn" class="btn btn-icon" title="Settings">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 4.754a3.246 3.246 0 100 6.492 3.246 3.246 0 000-6.492zM5.754 8a2.246 2.246 0 114.492 0 2.246 2.246 0 01-4.492 0z"/>
        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 01-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 01-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 01.52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 011.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 011.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 01.52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 01-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 01-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 002.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 001.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 00-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.292-.159a1.873 1.873 0 00-2.692 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 00-2.693-1.115l-.291.16c-.764.415-1.6-.421-1.184-1.185l.159-.292A1.873 1.873 0 001.945 8.93l-.318-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 003.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 002.692-1.116l.094-.318z"/>
      </svg>
    </button>
  </header>

  <!-- Selected element info -->
  <div id="element-info" class="element-info hidden">
    Selected: <strong id="element-name"></strong> (<span id="element-dims"></span>)
  </div>

  <!-- Settings panel (collapsible) -->
  <div id="settings-panel" class="settings-panel hidden">
    <h3>Tolerance Settings</h3>
    <div class="setting-row">
      <label>Spacing tolerance (px):</label>
      <input type="number" id="tol-spacing" value="2" min="0" max="20">
    </div>
    <div class="setting-row">
      <label>Color tolerance (per channel):</label>
      <input type="number" id="tol-color" value="5" min="0" max="50">
    </div>
    <div class="setting-row">
      <label>Border radius tolerance (px):</label>
      <input type="number" id="tol-radius" value="2" min="0" max="10">
    </div>
  </div>

  <!-- Side-by-side panels -->
  <div class="panels">
    <div class="panel-section">
      <h3>Figma CSS (paste)</h3>
      <textarea id="figma-input" placeholder="Paste CSS from Figma Dev Mode here..."></textarea>
    </div>
    <div class="panel-section">
      <h3>Extracted Styles (auto)</h3>
      <pre id="extracted-styles" class="styles-display">Pick an element to extract styles.</pre>
    </div>
  </div>

  <!-- Compare button -->
  <div class="actions">
    <button id="compare-btn" class="btn btn-primary" disabled>Compare</button>
  </div>

  <!-- Results -->
  <div id="results-section" class="results-section hidden">
    <div id="results-summary" class="results-summary"></div>
    <div id="results-list" class="results-list"></div>
    <div class="actions">
      <button id="copy-btn" class="btn">Copy Report</button>
      <button id="clear-btn" class="btn">Clear</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../lib/style-extractor.js"></script>
  <script src="../lib/figma-parser.js"></script>
  <script src="../lib/normalizer.js"></script>
  <script src="../lib/diff-engine.js"></script>
  <script src="panel.js"></script>
</body>
</html>
